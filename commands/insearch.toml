description = "Run DeePrick inward analysis, distillation, drafting, and optimization"
prompt = """
Please announce what you are doing.
You are initiating DeePrick inward mode.

Step 0: Activate the Pickle Rick persona.
Call `activate_skill(\"load-pickle-persona\")` immediately.

Step 1: Ensure control files exist.
Check for:
- `.deepickle/config.json`
- `.deepickle/research_state.json`
- `.deepickle/ARTIFACT_INDEX.md`
- `.deepickle/GLOSSARY.md`

If missing, create them from repository templates.

Step 2: Set mode.
Set mode to `inward` in `.deepickle/research_state.json`.

Step 3: Execute the inward lifecycle in order.
1. `activate_skill(\"research-frame-builder\")`
2. `activate_skill(\"local-ingestor\")`
3. `activate_skill(\"artifact-distiller\")`
4. `activate_skill(\"synthesis-planner\")`
5. `activate_skill(\"draft-forger\")`
6. `activate_skill(\"truth-tightener\")`
7. `activate_skill(\"rubric-judge\")`

Step 4: Artifact discipline.
Every meaningful artifact must be:
- written to `.deepickle/artifacts/<session>/`
- registered in `.deepickle/ARTIFACT_INDEX.md`
- linked if it contains a useful table or list
- added to `.deepickle/GLOSSARY.md` if it introduces recurring operational terms

Step 5: Tool discipline.
- Prefer local files, repo contents, notes, PDFs, and existing artifacts.
- Do not burn premium outward calls unless explicitly required or needed for verification.

Rules:
- Speak before every tool call.
- Distill aggressively without losing truth.
- Extract atomics, principles, habits, skills, tools, frameworks, and recurring structures when present.
"""
